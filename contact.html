<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Ved IT Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50">
    <section class="py-32">
        <div class="container mx-auto px-6 grid md:grid-cols-2 gap-24">
            <div>
                <h2 class="text-6xl font-bold mb-12 text-slate-900">Connect.</h2>
                <div class="space-y-12">
                    <div class="flex items-start">
                        <div class="text-4xl text-sky-500 mr-8"><i class="fas fa-envelope"></i></div>
                        <div class="flex flex-col space-y-2">
                            <span class="text-slate-400 uppercase font-bold text-xs tracking-widest">Email Channels</span>
                            <a href="mailto:support@veditsolutions.com" class="text-2xl font-bold hover:text-sky-500">support@veditsolutions.com</a>
                            <a href="mailto:info@veditsolutions.com" class="text-2xl font-bold hover:text-sky-500">info@veditsolutions.com</a>
                        </div>
                    </div>
                    <div class="flex items-start">
                        <div class="text-4xl text-sky-500 mr-8"><i class="fas fa-phone"></i></div>
                        <div class="flex flex-col space-y-2">
                            <span class="text-slate-400 uppercase font-bold text-xs tracking-widest">Support Lines</span>
                            <span class="text-2xl font-bold">+91 95798 82096</span>
                            <span class="text-2xl font-bold">+91 95798 71032</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bg-white p-16 rounded-[3rem] shadow-2xl border border-slate-100">
                <form class="space-y-6">
                    <input type="text" placeholder="Name" class="w-full p-5 border rounded-2xl bg-slate-50 focus:ring-4 focus:ring-sky-500/20 outline-none">
                    <input type="email" placeholder="Business Email" class="w-full p-5 border rounded-2xl bg-slate-50 focus:ring-4 focus:ring-sky-500/20 outline-none">
                    <textarea placeholder="Tell us about your plant's IoT requirements..." class="w-full p-5 border rounded-2xl bg-slate-50 h-40 focus:ring-4 focus:ring-sky-500/20 outline-none"></textarea>
                    <button class="w-full bg-slate-900 py-5 rounded-2xl text-white font-bold text-lg hover:bg-sky-500 transition">Submit Inquiry</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
